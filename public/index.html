<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaterMinder 💧</title>
    <!-- Menghubungkan ke manifest PWA jika ada -->
    <link rel="manifest" href="/manifest.json">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background-color: #f0f8ff; 
        }
        h1 { color: #0077be; }
        video, canvas { 
            max-width: 100%; 
            border-radius: 12px; 
            margin-top: 15px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        button { 
            padding: 12px 24px; 
            margin: 10px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            transition: 0.3s;
        }
        button:active { transform: scale(0.95); }
        #notifyBtn { background-color: #20b2aa; color: white; }
        #cameraBtn { background-color: #ff9800; color: white; }
        #captureBtn { background-color: #4CAF50; color: white; display: none; }
        #status { margin-top: 20px; font-size: 18px; font-weight: bold; }
        canvas { display: none; } /* Sembunyikan hasil foto di awal */
        #videoContainer { display: none; } /* Sembunyikan area kamera di awal */
    </style>
</head>
<body>

    <h1>WaterMinder Asa💧</h1>
    <p>Pengingat Minum Air Asa</p>
    
    <button id="notifyBtn">AKTIFKAN NOTIFIKASI 🔔</button>
    <br>
    <button id="cameraBtn">BUKA KAMERA 📸</button>
    
    <div id="videoContainer">
        <video id="video" autoplay playsinline></video>
        <br>
        <button id="captureBtn">AMBIL FOTO 📷</button>
    </div>
    
    <canvas id="canvas"></canvas>
    <p id="status"></p>
    <!-- KOTAK STATISTIK MINUM -->
    <div style="margin-top: 30px; padding: 15px; background-color: #e0f7fa; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.05);">
        <h3 style="margin-top: 0; color: #00838f;">Statistik Hari Ini 📊</h3>
        <p style="font-size: 18px; margin: 5px 0;">Total Minum: <strong id="drinkCount" style="color: #0077be; font-size: 24px;">0</strong> gelas</p>
        <p style="color: #555;">Terakhir minum: <span id="lastDrinkTime">Belum ada</span></p>
        <button id="resetBtn" style="background-color: #ff5252; color: white; padding: 8px 16px; font-size: 14px; margin-top: 10px;">Reset Data</button>
    </div>
    <script>
        // 1. KUNCI VAPID ASLI KAMU
        const publicVapidKey = 'BAc-JwNMO9tggLt1IARMD23OIlA1pItwyUd8qcKofukG3CkwR2zrHWdo7GLaH3F1d9Bdo1eBb-RsDbChyL6E8dA';

        // 2. DAFTARKAN SERVICE WORKER (Jembatan Notifikasi)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('Service Worker siap!'))
                .catch(err => console.error('Service Worker gagal:', err));
        }

        // 3. LOGIKA TOMBOL NOTIFIKASI
        document.getElementById('notifyBtn').addEventListener('click', async () => {
            if ('serviceWorker' in navigator && 'PushManager' in window) {
                try {
                    const permission = await Notification.requestPermission();
                    if (permission === 'granted') {
                        const registration = await navigator.serviceWorker.ready;
                        
                        const subscription = await registration.pushManager.subscribe({
                            userVisibleOnly: true,
                            applicationServerKey: urlBase64ToUint8Array(publicVapidKey)
                        });

                        // Kirim data HP ke server Railway
                        await fetch('/subscribe', {
                            method: 'POST',
                            body: JSON.stringify(subscription),
                            headers: { 'Content-Type': 'application/json' }
                        });

                        document.getElementById('status').innerText = 'Notifikasi Aktif! ✅';
                        document.getElementById('status').style.color = 'green';
                    } else {
                        document.getElementById('status').innerText = 'Izin notifikasi ditolak oleh sistem.';
                        document.getElementById('status').style.color = 'red';
                    }
                } catch (error) {
                    console.error('Error:', error);
                    document.getElementById('status').innerText = 'Terjadi kesalahan saat mengaktifkan notifikasi.';
                }
            } else {
                alert('Maaf, browser HP kamu tidak mendukung fitur ini.');
            }
        });

        // Helper: Mengubah format VAPID Key agar bisa dibaca browser
        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }

        // 4. LOGIKA KAMERA & FOTO (Tanpa AI)
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        const cameraBtn = document.getElementById('cameraBtn');
        const captureBtn = document.getElementById('captureBtn');
        const videoContainer = document.getElementById('videoContainer');
        const statusText = document.getElementById('status');

        // Buka Kamera Belakang
        cameraBtn.addEventListener('click', async () => {
            try {
                // facingMode: 'environment' memaksa HP pakai kamera belakang (jika ada)
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                
                videoContainer.style.display = 'block';
                captureBtn.style.display = 'inline-block';
                cameraBtn.style.display = 'none'; 
                canvas.style.display = 'none'; 
                
                statusText.innerText = 'Silakan jepret bukti kamu minum! 💧';
                statusText.style.color = 'black';
            } catch (err) {
                console.error('Kamera gagal diakses:', err);
                statusText.innerText = 'Gagal membuka kamera. Pastikan izin kamera diberikan.';
                statusText.style.color = 'red';
            }
        });

        // Jepret Foto -> Langsung Sukses!
        captureBtn.addEventListener('click', () => {
            // Sesuaikan ukuran kanvas dengan video
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Cetak gambar ke layar
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Matikan aliran kamera agar baterai tidak boros
            const stream = video.srcObject;
            if (stream) {
                const tracks = stream.getTracks();
                tracks.forEach(track => track.stop());
                video.srcObject = null;
            }

            // Ganti tampilan antarmuka
            canvas.style.display = 'block';
            videoContainer.style.display = 'none';
            cameraBtn.style.display = 'inline-block'; 
            cameraBtn.innerText = 'FOTO ULANG 📸';

            // NYATAKAN SUKSES!
            statusText.innerText = 'i Love You Asa ❤️😘. ✅💧';
            statusText.style.color = 'green';
        });
        // --- FITUR STATISTIK LOCALSTORAGE ---

        // 1. Ambil data dari memori HP saat web dibuka
        let totalDrinks = localStorage.getItem('waterCount') || 0;
        let lastTime = localStorage.getItem('lastDrinkTime') || 'Belum ada';

        // 2. Tampilkan data ke layar
        document.getElementById('drinkCount').innerText = totalDrinks;
        document.getElementById('lastDrinkTime').innerText = lastTime;

        // 3. Update data saat tombol "AMBIL FOTO" diklik
        captureBtn.addEventListener('click', () => {
            // Tambah jumlah minum
            totalDrinks++;
            localStorage.setItem('waterCount', totalDrinks);

            // Catat jam saat ini
            const now = new Date();
            const timeString = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
            localStorage.setItem('lastDrinkTime', timeString);

            // Perbarui tampilan di layar
            document.getElementById('drinkCount').innerText = totalDrinks;
            document.getElementById('lastDrinkTime').innerText = timeString;
        });

        // 4. Tombol Reset untuk mengulang dari 0 besok harinya
        document.getElementById('resetBtn').addEventListener('click', () => {
            const konfirmasi = confirm('Yakin ingin mereset data minum hari ini?');
            if (konfirmasi) {
                localStorage.removeItem('waterCount');
                localStorage.removeItem('lastDrinkTime');
                totalDrinks = 0;
                document.getElementById('drinkCount').innerText = '0';
                document.getElementById('lastDrinkTime').innerText = 'Belum ada';
            }
        });
    </script>
</body>
</html>
